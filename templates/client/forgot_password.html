<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — {{ APP_NAME }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/metro.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
</head>
<body class="client-layout" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--client-canvas);">
<div style="width:100%;max-width:440px;padding:24px;">
  <div style="text-align:center;margin-bottom:32px;">
    <a href="{{ url_for('public.index') }}" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:24px;">
      <div style="width:34px;height:34px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--client-text);">{{ APP_NAME }}</span>
    </a>
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--client-text);margin:0 0 8px;letter-spacing:-.03em;">Forgot your password?</h1>
    <p style="font-family:'DM Sans',sans-serif;font-size:14px;color:var(--client-text-muted);margin:0;">Enter your email and we'll send you a reset link.</p>
  </div>
  <div class="client-form-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}<div class="me-alert me-alert-{{ 'danger' if cat in ['error','danger'] else cat }}" style="margin-bottom:16px;font-family:'DM Sans',sans-serif;"><span>{{ msg }}</span></div>{% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('client_auth.forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div style="margin-bottom:18px;"><label class="client-label" for="email">Email Address</label><input type="email" id="email" name="email" class="client-input" placeholder="your@email.com" required /></div>
      <button type="submit" class="btn-client btn-client-gold" style="width:100%;justify-content:center;padding:13px;font-size:15px;">Send Reset Link</button>
    </form>
    <div style="text-align:center;margin-top:20px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--client-text-muted);">
      Remembered it? <a href="{{ url_for('client_auth.login') }}" style="color:var(--brand-dark);font-weight:600;">Back to Login</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
